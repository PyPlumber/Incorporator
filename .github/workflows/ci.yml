name: CI

on:
  pull_request:
    branches: [main, refactor-ai]
  push:
    branches: [main, refactor-ai]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dev extras
        run: pip install -e .[dev]
      - name: ruff check
        run: ruff check incorporator/
      - name: ruff format --check
        run: ruff format --check incorporator/
      - name: black --check
        run: black --check incorporator/

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install with all optional extras
        run: pip install -e .[all,parquet,dev]
      - name: mypy
        run: mypy incorporator/

  test:
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install with all optional extras
        run: pip install -e .[all,parquet,dev]
      - name: pytest
        run: pytest --no-cov -q -p no:randomly -m "not benchmark"
